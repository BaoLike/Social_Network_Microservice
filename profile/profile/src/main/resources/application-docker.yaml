spring:
  config:
    activate:
      on-profile: docker
  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:12345678}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
